<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NASTY — App Store shots</title>
<style>
  :root{
    --felt1:#256b46; --felt2:#0e3421;
    --cream:#fbf7ee; --gold:#f4c542; --ink:#2b2118;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,"Segoe UI",system-ui,sans-serif;
    color:var(--cream);
    background:radial-gradient(120% 95% at 50% 0%,var(--felt1),var(--felt2) 78%);
    background-attachment:fixed;
    min-height:100vh;
    padding:36px 16px 64px;
  }
  header{text-align:center;margin-bottom:8px}
  .sign{
    display:inline-block;
    background:linear-gradient(160deg,#1f7d40,#0d3d20);
    border:3px solid var(--cream);
    border-radius:14px;
    padding:14px 30px;
    box-shadow:0 8px 22px rgba(0,0,0,.4);
  }
  .sign b{
    font-size:clamp(28px,7vw,44px);
    letter-spacing:.08em;
    color:var(--cream);
    text-shadow:0 2px 0 rgba(0,0,0,.35);
  }
  header p{
    color:#cfe6d6;
    font-size:15px;
    letter-spacing:.03em;
    margin:18px auto 0;
    max-width:480px;
  }
  .grid{
    max-width:1180px;
    margin:40px auto 0;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
    gap:36px 28px;
    justify-items:center;
  }
  figure{
    margin:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    width:100%;
    max-width:320px;
  }
  .shot{
    width:100%;
    max-width:280px;
    border-radius:28px;
    overflow:hidden;
    border:1px solid rgba(255,255,255,.18);
    box-shadow:0 16px 40px rgba(0,0,0,.5),0 0 0 6px rgba(0,0,0,.25);
    background:#0e3421;
  }
  .shot img{
    display:block;
    width:100%;
    max-width:100%;
    height:auto;
  }
  figcaption{
    margin-top:14px;
    text-align:center;
    font-size:15px;
    color:var(--cream);
    line-height:1.4;
  }
  figcaption .tag{
    display:block;
    font-size:11px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--gold);
    margin-bottom:4px;
  }
  footer{
    text-align:center;
    margin-top:56px;
    color:#a9c8b6;
    font-size:12px;
    letter-spacing:.05em;
  }
  footer a{color:var(--gold)}
</style>
</head>
<body>
  <header>
    <div class="sign"><b>NASTY</b></div>
    <p>App Store shots — the Pangman family board game, digitized.<br>
      Golf tees, a real board, and a very satisfying blast when you take somebody out.</p>
  </header>

  <div class="grid">
    <figure>
      <div class="shot"><img src="setup.png" alt="Game setup screen"></div>
      <figcaption><span class="tag">Setup</span>Pick players, teams, and who's human vs. CPU</figcaption>
    </figure>

    <figure>
      <div class="shot"><img src="board4.png" alt="4-player board mid-game"></div>
      <figcaption><span class="tag">4-Player</span>Tees racing around the board, deck in the dealer's corner</figcaption>
    </figure>

    <figure>
      <div class="shot"><img src="preview.png" alt="Card path preview with gold and red rings"></div>
      <figcaption><span class="tag">Card Preview</span>Tap a card and see the dotted path — gold ring to land safe, red ring to take someone out</figcaption>
    </figure>

    <figure>
      <div class="shot"><img src="nasty.png" alt="NASTY takeout blast animation"></div>
      <figcaption><span class="tag">Nasty!</span>Land on an opponent and send their tee flying back to base</figcaption>
    </figure>

    <figure>
      <div class="shot"><img src="win.png" alt="Win screen with confetti"></div>
      <figcaption><span class="tag">Victory</span>All five tees home — confetti and bragging rights</figcaption>
    </figure>

    <figure>
      <div class="shot"><img src="board6.png" alt="6-player teams board mid-game"></div>
      <figcaption><span class="tag">6-Player Teams</span>Partners sit across the board — ten tees moving at once</figcaption>
    </figure>
  </div>

  <footer>
    NASTY — <a href="https://bpangman.github.io/nasty/">bpangman.github.io/nasty</a>
  </footer>
</body>
</html>
